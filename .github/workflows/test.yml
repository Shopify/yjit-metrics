name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: yjit-metrics
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: yjit-metrics

      # - name: Checkout ruby-bench
      #   uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      #   with:
      #     repository: ruby/ruby-bench
      #     path: yjit-metrics/build/ruby-bench

      - uses: ruby/setup-ruby@09a7688d3b55cf0e976497ff046b70949eeaccfd # v1.288.0
        with:
          bundler-cache: true
          working-directory: yjit-metrics

      - name: Setup CPU
        run: ./setup.sh cpu

      - name: Run tests
        run: bundle exec rake
        env:
          TEST_OPTS: "-v"
